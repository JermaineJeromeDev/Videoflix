<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Videoflix Aktivierung</title>
</head>
<body style="margin:0;padding:0;background-color:#141414;color:#ffffff;font-family:Arial,Helvetica,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#141414;padding:20px;">
        <tr>
            <td align="center">
                
                <img src="https://postimg.cc" alt="Videoflix Logo" width="180" style="display:block;border:0;" />
            </td>
        </tr>
        <tr>
            <td align="center" style="padding:20px 0;">
                
                <img src="https://postimg.cc" alt="E-Mail Aktivierung" width="520" style="max-width:100%;display:block;border:0;" />
            </td>
        </tr>
        <tr>
            <td style="background:#000000;border-radius:12px;padding:30px;">
                <h1 style="margin:0 0 16px 0;font-size:24px;color:#ffffff;">Willkommen bei Videoflix!</h1>
                <p style="margin:0 0 24px 0;line-height:1.6;color:#dcdcdc;">Dein Account wurde erstellt. Klicke auf den Button, um die Aktivierung abzuschließen.</p>
                <p style="text-align:center;">
                    <a href="{{ activate_url }}" style="background:#8903FF;color:#ffffff;text-decoration:none;padding:14px 28px;border-radius:8px;display:inline-block;font-weight:bold;">Konto aktivieren</a>
                </p>
                <p style="margin:24px 0 0 0;font-size:14px;color:#7a7a7a;">Falls der Button nicht funktioniert, kopiere diesen Link in deinen Browser:<br><a href="{{ activate_url }}" style="color:#7a7a7a;text-decoration:none;">{{ activate_url }}</a></p>
            </td>
        </tr>
        <tr>
            <td align="center" style="padding:24px 0 0 0;font-size:12px;color:#5c5c5c;">
                &copy; 2026 Videoflix. Alle Rechte vorbehalten.
            </td>
        </tr>
    </table>
</body>
</html>
